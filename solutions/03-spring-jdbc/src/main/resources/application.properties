# ============================================================
# Module 03 Lab - DataSource configuration for MySQL
# ============================================================
# Ensure stocksdb exists before starting:
#   CREATE DATABASE IF NOT EXISTS stocksdb;
#   CREATE USER IF NOT EXISTS 'appuser'@'localhost' IDENTIFIED BY 'apppass';
#   GRANT ALL PRIVILEGES ON stocksdb.* TO 'appuser'@'localhost';
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/stocksdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always

app.service-name=Stock Service
app.version=3.0.0
spring.main.banner-mode=off
