spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate should not attempt to create or modify the schema.
# schema.sql (below) owns the DDL; Hibernate reads the existing tables.
spring.jpa.hibernate.ddl-auto=none

# Run schema.sql on every startup (CREATE TABLE IF NOT EXISTS makes this safe).
spring.sql.init.mode=always

# Ensure schema.sql runs after the JPA layer initialises (good practice with JPA).
spring.jpa.defer-datasource-initialization=true

spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
