# ============================================================
# application.properties - Module 02 Demo
# ============================================================
# Spring Boot reads this file automatically at startup.
# These values are bound to the application via @Value or
# @ConfigurationProperties. They can be overridden at runtime
# using environment variables or command-line arguments.
#
# Examples:
#   java -jar app.jar --app.service-name="Accounts v2"
#   APP_SERVICE_NAME="Accounts v2" java -jar app.jar
# ============================================================

# Custom application properties (not Spring built-ins)
app.service-name=Account Service
app.version=2.0.0
app.max-accounts=1000

# Reduce Spring Boot startup banner noise in demos
spring.main.banner-mode=off

# Show which auto-configuration classes matched/did not match at startup.
# Set to DEBUG to see the CONDITIONS EVALUATION REPORT.
# logging.level.root=DEBUG
