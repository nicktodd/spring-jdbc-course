# ============================================================
# Module 03 Demo - DataSource configuration for MySQL
# ============================================================
# SpringBoot auto-configures a DataSource and JdbcTemplate
# from these properties. HikariCP is the default connection pool.
#
# Ensure bankdb exists before starting:
#   CREATE DATABASE IF NOT EXISTS bankdb;
#   CREATE USER IF NOT EXISTS 'appuser'@'localhost' IDENTIFIED BY 'apppass';
#   GRANT ALL PRIVILEGES ON bankdb.* TO 'appuser'@'localhost';
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Apply schema.sql on every startup (safe because all DDL uses IF NOT EXISTS)
spring.sql.init.mode=always

app.service-name=Account Service
app.version=3.0.0
spring.main.banner-mode=off
