# ============================================================
# Module 04 Demo - REST API
# ============================================================
# The embedded Tomcat server starts on port 8080 by default.
# All endpoints are available at http://localhost:8080/api/...
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always

# Pretty-print JSON responses - useful during development
spring.jackson.serialization.indent-output=true

# Date/time format: ISO-8601 strings instead of numeric timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

app.service-name=Account REST Service
app.version=4.0.0
spring.main.banner-mode=off
