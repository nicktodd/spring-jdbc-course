<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { color: #0366d6; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th { background-color: #0366d6; color: white; padding: 10px 12px; text-align: left; }
        td { padding: 8px 12px; border-bottom: 1px solid #ddd; }
        tr:hover td { background-color: #f0f6ff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; background: #e1ecf4; color: #0366d6; }
        #status { margin-top: 12px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Stock Tracker</h1>
    <p>Live data from the Spring Boot API running inside this Docker container.</p>
    <table>
        <thead>
            <tr><th>Symbol</th><th>Company</th><th>Sector</th><th>Exchange</th></tr>
        </thead>
        <tbody id="stocks-body">
            <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
    <p id="status"></p>
    <script>
        fetch('/api/stocks')
            .then(r => r.json())
            .then(stocks => {
                const tbody = document.getElementById('stocks-body');
                tbody.innerHTML = '';
                if (stocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No stocks found.</td></tr>';
                    return;
                }
                stocks.forEach(s => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td><strong>${s.symbol}</strong></td><td>${s.companyName}</td><td>${s.sector}</td><td><span class="badge">${s.exchange}</span></td>`;
                    tbody.appendChild(row);
                });
                document.getElementById('status').textContent = `${stocks.length} stock(s) loaded from /api/stocks`;
            })
            .catch(err => {
                document.getElementById('stocks-body').innerHTML = '<tr><td colspan="4">Error loading stocks.</td></tr>';
                console.error(err);
            });
    </script>
</body>
</html>
